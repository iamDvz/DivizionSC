# defs-advanced.yml — продвинутые def (chain, delay, projectile, EffectLib)
# Создаётся при первом запуске. Тест: /dsc cast arcane_meteor

fireball_pain_heavy:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 12

# ═══════════════════════════════════════════════════════════════════════════════
# ПРОДВИНУТЫЕ ПРИМЕРЫ — многоступенчатые chain, delay, projectile, EffectLib
# ═══════════════════════════════════════════════════════════════════════════════

arcane_meteor:
  name: "&5&l☄ Арканный метеор"
  description: "Канал → заряд → огненный снаряд → ударная волна и поджог"
  permission: divizionsc.def.arcane_meteor
  cooldown: 28
  trigger: right_click
  target: block
  range: 64
  chain:
    on_cast:
      - meteor_channel_announce
      - meteor_channel_rune_ring
    on_hit:
      - def: meteor_impact_damage
        args:
          amount: 14
      - meteor_impact_knockback
      - meteor_scorch_aura
      - meteor_impact_boom_vfx
    on_complete:
      - meteor_channel_finish
  cast-item:
    material: NETHER_STAR
    name: "&5&l☄ Арканный метеор"
    lore:
      - "&7ПКМ — вызвать небесный камень"
      - "&8Канал 2с → снаряд → взрыв"
      - "&cПерезарядка: 28с"
  effects:
    - type: sound
      sound: ENTITY_WITHER_SHOOT
      volume: 0.6
      pitch: 0.7
    - type: delay
      ticks: 10
      effects:
        - type: effectlib
          at: eyes
          class: SphereEffect
          particle: portal
          radius: 0.4
          particles: 24
          iterations: 20
          period: 1
    - type: delay
      ticks: 25
      effects:
        - type: sound
          sound: ENTITY_ENDER_DRAGON_GROWL
          volume: 0.4
          pitch: 1.6
        - type: particle
          particle: DRAGON_BREATH
          count: 40
          offset: 0.6
    - type: delay
      ticks: 40
      effects:
        - type: projectile
          projectile: FIREBALL
          speed: 1.6
          incendiary: true
          yield: 1.5
          on_hit:
            - type: particle
              particle: EXPLOSION
              count: 2
              offset: 0.1
            - type: sound
              sound: ENTITY_GENERIC_EXPLODE
              volume: 1.2
              pitch: 0.8

meteor_channel_announce:
  helper: true
  target: self
  effects:
    - type: message
      text: "&5✦ &dНебо темнеет... ты собираешь арканную энергию."

meteor_channel_rune_ring:
  helper: true
  target: self
  effects:
    - type: effectlib
      at: self
      class: SphereEffect
      particle: enchant
      radius: 2.5
      particles: 48
      iterations: 35
      period: 2

meteor_channel_finish:
  helper: true
  target: self
  effects:
    - type: message
      text: "&5✦ &7Канал завершён. Остаточная энергия рассеивается."
    - type: particle
      particle: END_ROD
      count: 16
      offset: 0.4

meteor_impact_damage:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 10
    - type: potion
      effect: WITHER
      duration: 60
      amplifier: 0

meteor_impact_knockback:
  helper: true
  target: entity
  effects:
    - type: velocity
      power: 2.4
      y: 0.55

meteor_scorch_aura:
  helper: true
  target: none
  effects:
    - type: delay
      ticks: 5
      effects:
        - type: particle
          particle: FLAME
          count: 60
          offset: 2.5
        - type: def
          def: meteor_scorch_tick
          args:
            amount: 3
    - type: delay
      ticks: 25
      effects:
        - type: def
          def: meteor_scorch_tick
          args:
            amount: 2
    - type: delay
      ticks: 45
      effects:
        - type: particle
          particle: SMOKE
          count: 30
          offset: 1.8

meteor_scorch_tick:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 2

meteor_impact_boom_vfx:
  helper: true
  target: none
  effects:
    - type: effectlib
      at: target
      class: SphereEffect
      particle: lava
      radius: 3.0
      particles: 80
      iterations: 12
      period: 1
    - type: sound
      sound: ENTITY_BLAZE_DEATH
      volume: 0.9
      pitch: 0.5

shadow_assassination:
