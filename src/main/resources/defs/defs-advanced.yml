      volume: 0.5
      pitch: 1.8
    - type: delay
      ticks: 8
      effects:
        - type: teleport
          forward: 6
          safe: true
        - type: def
          def: shadow_strike_phase
          args:
            amount: 5
    - type: delay
      ticks: 18
      effects:
        - type: def
          def: shadow_strike_phase
          args:
            amount: 7
        - type: particle
          particle: SMOKE
          count: 20
          offset: 0.5
    - type: delay
      ticks: 28
      effects:
        - type: def
          def: shadow_strike_finisher
          args:
            amount: 12
        - type: velocity
          power: 0.8
          y: 0.35
    - type: delay
      ticks: 35
      effects:
        - type: teleport
          forward: -4
          safe: true

