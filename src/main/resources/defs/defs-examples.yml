# defs-examples.yml — простой синтаксис DivizionSC
# Файлы: plugins/DivizionSC/defs/defs-*.yml
#
# Поля def:
#   cd / cooldown       перезарядка (сек)
#   key / on / trigger  rclick, lclick, shift, space, w, q, f, cmd, …
#   tgt / to / target   self, entity, block, none
#   rng / range         дальность
#   item                MATERIAL | имя | lore | lore2
#   do                  список эффектов (строки)
#   hit / cast / done   chain (один id или список)
#
# Эффекты (строки в do:):
#   heal 6              dmg 5           tp 8
#   snd player_levelup  ptl portal 30   pot speed 5s 1
#   vel 1.2 0.5         lit             msg &aТекст
#   call heal_vfx       @helper_id      proj fireball 1.4
#   fx sphere heart 1.2 wait 1s: heal 3, snd pop
#   wait: 20 + do: [...]  — задержка с вложенными эффектами

heal:
  name: "&aЛечение"
  cd: 8
  key: rclick
  tgt: self
  item: GOLDEN_APPLE | &aЛечение | &7ПКМ — 6 HP
  do:
    - heal 6
    - snd player_levelup 0.6 1.4
  done: heal_vfx

heal_vfx:
  helper: true
  tgt: self
  do:
    - fx sphere heart 1.2 20 15 2

blink:
  name: "&bРывок"
  cd: 4
  key: shift
  tgt: self
  do:
    - ptl portal 30
    - snd enderman_teleport 0.5 1.2
    - tp 8

leap:
  name: "&bПрывок"
  cd: 3
  key: space
  tgt: self
  do:
    - vel 1.2 0.5
    - tp 4

fireball:
  name: "&cОгненный шар"
  cd: 6
  key: rclick
  rng: 32
  item: BLAZE_ROD | &cОгненный шар | &7ПКМ — выпустить
  do:
    - snd blaze_shoot 0.8 1.0
    - proj fireball 1.4
  hit:
    - fireball_pain
    - fireball_burn_vfx

fireball_pain:
  helper: true
  tgt: entity
  do:
    - dmg 5

fireball_burn_vfx:
  helper: true
  tgt: entity
  do:
    - fx sphere flame 1.0 16 10 1

fireball_pain_heavy:
  helper: true
  tgt: entity
  do:
    - dmg 12

combo_strike:
  name: "&6Комбо-удар"
  cd: 10
  key: cmd
  tgt: entity
  rng: 16
  do:
    - call fireball_pain
    - snd player_attack_strong 0.8 0.9
  done:
    - def: fireball_pain_heavy
      args:
        amount: 10

lightning_strike:
  name: "&eУдар молнии"
  cd: 12
  key: cmd
  tgt: entity
  rng: 24
  do:
    - lit
    - dmg 4

# Доп. наборы (копируются при первом запуске):
#   defs-combat.yml  — простой бой (/dsc cast combat_slash)
#   defs-magic.yml   — verbose магия (/dsc cast magic_frost_nova)
#   defs-boss.dsc    — DSC модули (/dsc cast boss_slam)
