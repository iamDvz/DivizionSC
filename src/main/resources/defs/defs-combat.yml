# defs-combat.yml — боевой набор (простой синтаксис)
# Тест: /dsc cast combat_slash · /dsc give combat_dash

# --- helpers ---

combat_slash_vfx:
  helper: true
  tgt: entity
  do:
    - ptl crit 18
    - snd player_attack_crit 0.7 1.2

combat_riposte_hit:
  helper: true
  tgt: entity
  do:
    - dmg 6
    - ptl sweep_attack 20
    - snd item_shield_block 0.6 1.4

combat_execute_finisher:
  helper: true
  tgt: entity
  do:
    - dmg 14
    - ptl damage_indicator 8
    - snd entity_player_attack_knockback 0.8 0.7
    - fx sphere crit 1.4 24 12 1

combat_whirlwind_tick:
  helper: true
  tgt: entity
  do:
    - dmg 3
    - ptl sweep_attack 12

combat_whirlwind_end:
  helper: true
  tgt: self
  do:
    - snd entity_iron_golem_attack 0.5 1.1
    - fx circle cloud 2.0 30 8 2

# --- castable ---

combat_slash:
  name: "&cРазрез"
  desc: "&7ЛКМ по цели — быстрый удар"
  cd: 4
  key: lclick
  tgt: mob
  rng: 12
  item: IRON_SWORD | &cРазрез | &7ЛКМ — урон по цели
  do:
    - dmg 7
    - @combat_slash_vfx

combat_dash:
  name: "&bРывок в бою"
  desc: "&7Shift — рывок вперёд с облаком пыли"
  cd: 3
  key: shift
  tgt: self
  item: LEATHER_BOOTS | &bРывок | &7Shift — 6 блоков вперёд
  do:
    - ptl cloud 14
    - snd entity_horse_gallop 0.4 1.5
    - tp 6

combat_riposte:
  name: "&6Контрудар"
  desc: "&7Двойной удар с задержкой"
  cd: 8
  key: rclick
  tgt: mob
  rng: 10
  item: SHIELD | &6Контрудар | &7ПКМ — два удара
  do:
    - @combat_riposte_hit
    - wait: 6t
      do:
        - @combat_riposte_hit
        - snd entity_player_attack_sweep 0.7 1.0

combat_execute:
  name: "&4Казнь"
  desc: "&7Удар → пауза → добивание через chain"
  cd: 12
  key: cmd
  tgt: mob
  rng: 16
  item: NETHERITE_AXE | &4Казнь | &7Команда — комбо с финишером
  do:
    - dmg 5
    - snd entity_zombie_attack_wooden_door 0.6 0.9
    - wait: 12t
      do:
        - dmg 3
        - @combat_slash_vfx
  done:
    - def: combat_execute_finisher
      args:
        amount: 16

combat_whirlwind:
  name: "&eВихрь клинка"
  desc: "&7Три волны урона вокруг цели"
  cd: 14
  key: q
  tgt: mob
  rng: 8
  item: GOLDEN_SWORD | &eВихрь | &7Q — серия ударов
  do:
    - @combat_whirlwind_tick
    - wait: 8t
      do:
        - @combat_whirlwind_tick
    - wait: 16t
      do:
        - @combat_whirlwind_tick
        - @combat_whirlwind_end

combat_shield_bash:
  name: "&7Удар щитом"
  desc: "&7Отбрасывание и оглушение"
  cd: 6
  key: lclick
  tgt: mob
  rng: 6
  item: SHIELD | &7Удар щитом | &7ЛКМ вблизи
  do:
    - dmg 4
    - vel 1.8 0.4
    - pot slowness 2s 1
    - snd block_anvil_land 0.5 1.3
    - ptl block 16
