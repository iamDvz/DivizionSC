# defs-magic.yml — магия (verbose: chain, delay, projectile, EffectLib, args)
# Тест: /dsc cast magic_frost_nova · /dsc cast magic_soul_drain

# ═══════════════════════════════════════════════════════════════════════════════
# FROST NOVA — канал → взрыв льда → замедление
# ═══════════════════════════════════════════════════════════════════════════════

magic_frost_nova:
  name: "&b&l❄ Морозная nova"
  description: "Канал → ледяной взрыв → замедление цели"
  permission: divizionsc.def.magic_frost_nova
  cooldown: 18
  trigger: right_click
  target: entity
  range: 20
  chain:
    on_cast:
      - magic_frost_channel_msg
      - magic_frost_channel_ring
    on_complete:
      - magic_frost_aftermath
  cast-item:
    material: BLUE_ICE
    name: "&b&l❄ Морозная nova"
    lore:
      - "&7ПКМ по цели"
      - "&7Канал 1с → урон + замедление"
  effects:
    - type: sound
      sound: BLOCK_GLASS_BREAK
      volume: 0.5
      pitch: 1.6
    - type: delay
      ticks: 15
      effects:
        - type: effectlib
          at: target
          class: SphereEffect
          particle: snowflake
          radius: 2.0
          particles: 40
          iterations: 15
          period: 1
    - type: delay
      ticks: 20
      effects:
        - type: def
          def: magic_frost_blast_damage
          args:
            amount: 8
        - type: def
          def: magic_frost_slow
          args:
            duration: 80
        - type: particle
          particle: SNOWFLAKE
          count: 60
          offset: 1.2
        - type: sound
          sound: ENTITY_PLAYER_HURT_FREEZE
          volume: 0.8
          pitch: 0.9

magic_frost_channel_msg:
  helper: true
  target: self
  effects:
    - type: message
      text: "&b❄ &7Лёд сжимается вокруг твоих рук..."

magic_frost_channel_ring:
  helper: true
  target: self
  effects:
    - type: effectlib
      at: self
      class: CircleEffect
      particle: end_rod
      radius: 1.8
      particles: 24
      iterations: 20
      period: 2

magic_frost_blast_damage:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 6
    - type: particle
      particle: ITEM_SNOWBALL
      count: 20
      offset: 0.4

magic_frost_slow:
  helper: true
  target: entity
  effects:
    - type: potion
      effect: SLOWNESS
      duration: 60
      amplifier: 1

magic_frost_aftermath:
  helper: true
  target: self
  effects:
    - type: message
      text: "&b❄ &7Мороз рассеивается."
    - type: particle
      particle: CLOUD
      count: 12
      offset: 0.3

# ═══════════════════════════════════════════════════════════════════════════════
# SOUL DRAIN — DoT через серию delay + args
# ═══════════════════════════════════════════════════════════════════════════════

magic_soul_drain:
  name: "&5&l☽ Высасывание души"
  description: "Три тика урона с нарастанием"
  permission: divizionsc.def.magic_soul_drain
  cooldown: 16
  trigger: command
  target: entity
  range: 18
  chain:
    on_cast:
      - magic_soul_drain_start
    on_complete:
      - magic_soul_drain_finish
  effects:
    - type: def
      def: magic_soul_drain_tick
      args:
        amount: 3
    - type: delay
      ticks: 15
      effects:
        - type: def
          def: magic_soul_drain_tick
          args:
            amount: 4
    - type: delay
      ticks: 30
      effects:
        - type: def
          def: magic_soul_drain_tick
          args:
            amount: 6
        - type: effectlib
          at: target
          class: HelixEffect
          particle: soul
          radius: 0.8
          particles: 16
          iterations: 25
          period: 1

magic_soul_drain_start:
  helper: true
  target: self
  effects:
    - type: message
      text: "&5☽ &dТы чувствуешь, как жизнь утекает из цели..."
    - type: sound
      sound: ENTITY_WARDEN_HEARTBEAT
      volume: 0.4
      pitch: 1.4

magic_soul_drain_tick:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 3
    - type: heal
      amount: 2
      target: self
    - type: particle
      particle: SOUL
      count: 8
      offset: 0.3

magic_soul_drain_finish:
  helper: true
  target: self
  effects:
    - type: message
      text: "&5☽ &7Связь разорвана."
    - type: sound
      sound: ENTITY_PHANTOM_AMBIENT
      volume: 0.3
      pitch: 1.6

# ═══════════════════════════════════════════════════════════════════════════════
# ARCANE BARRIER — бафф + chain on_complete
# ═══════════════════════════════════════════════════════════════════════════════

magic_arcane_barrier:
  name: "&9&l⬡ Арканный барьер"
  description: "Щит, сопротивление и VFX на время каста"
  permission: divizionsc.def.magic_arcane_barrier
  cooldown: 25
  trigger: sneak
  target: self
  chain:
    on_cast:
      - magic_barrier_raise
    on_complete:
      - magic_barrier_drop
  cast-item:
    material: AMETHYST_SHARD
    name: "&9&l⬡ Арканный барьер"
    lore:
      - "&7Shift — поднять щит на 3с"
  effects:
    - type: potion
      effect: RESISTANCE
      duration: 60
      amplifier: 1
    - type: potion
      effect: ABSORPTION
      duration: 60
      amplifier: 0
    - type: effectlib
      at: self
      class: SphereEffect
      particle: enchant
      radius: 1.2
      particles: 32
      iterations: 30
      period: 2
    - type: delay
      ticks: 40
      effects:
        - type: sound
          sound: BLOCK_BEACON_POWER_SELECT
          volume: 0.5
          pitch: 1.8

magic_barrier_raise:
  helper: true
  target: self
  effects:
    - type: message
      text: "&9⬡ &bБарьер активирован."
    - type: particle
      particle: ENCHANT
      count: 40
      offset: 0.8

magic_barrier_drop:
  helper: true
  target: self
  effects:
    - type: message
      text: "&9⬡ &7Барьер рассеялся."
    - type: particle
      particle: END_ROD
      count: 16
      offset: 0.5

# ═══════════════════════════════════════════════════════════════════════════════
# ARCANE BOLT — снаряд + on_hit inline + chain
# ═══════════════════════════════════════════════════════════════════════════════

magic_arcane_bolt:
  name: "&d&l✦ Арканная стрела"
  description: "Снаряд с уроном при попадании"
  permission: divizionsc.def.magic_arcane_bolt
  cooldown: 5
  trigger: left_click
  target: none
  range: 32
  chain:
    on_hit:
      - magic_bolt_hit_vfx
      - def: magic_bolt_hit_damage
        args:
          amount: 7
    on_complete:
      - magic_bolt_recover
  cast-item:
    material: BLAZE_ROD
    name: "&d&l✦ Арканная стрела"
    lore:
      - "&7ЛКМ — выпустить снаряд"
  effects:
    - type: sound
      sound: ENTITY_EVOKER_CAST_SPELL
      volume: 0.6
      pitch: 1.3
    - type: projectile
      projectile: SNOWBALL
      speed: 1.8
      on_hit:
        - type: particle
          particle: WITCH
          count: 20
          offset: 0.4
        - type: sound
          sound: ENTITY_EVOKER_FANGS_ATTACK
          volume: 0.7
          pitch: 1.1

magic_bolt_hit_damage:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 5

magic_bolt_hit_vfx:
  helper: true
  target: entity
  effects:
    - type: effectlib
      at: target
      class: SphereEffect
      particle: witch
      radius: 0.6
      particles: 16
      iterations: 8
      period: 1

magic_bolt_recover:
  helper: true
  target: self
  effects:
    - type: particle
      particle: ENCHANT
      count: 8
      offset: 0.2

# ═══════════════════════════════════════════════════════════════════════════════
# METEOR STRIKE — упрощённый многофазный ульт (block target)
# ═══════════════════════════════════════════════════════════════════════════════

magic_meteor_strike:
  name: "&6&l☄ Удар метеора"
  description: "Канал → снаряд в точку → ударная волна"
  permission: divizionsc.def.magic_meteor_strike
  cooldown: 30
  trigger: command
  target: block
  range: 48
  chain:
    on_cast:
      - magic_meteor_windup
    on_hit:
      - def: magic_meteor_impact
        args:
          amount: 12
      - magic_meteor_shockwave
    on_complete:
      - magic_meteor_cooldown_msg
  effects:
    - type: sound
      sound: ENTITY_BLAZE_SHOOT
      volume: 0.7
      pitch: 0.6
    - type: delay
      ticks: 30
      effects:
        - type: effectlib
          at: eyes
          class: SphereEffect
          particle: flame
          radius: 0.5
          particles: 20
          iterations: 15
          period: 1
    - type: delay
      ticks: 50
      effects:
        - type: projectile
          projectile: FIREBALL
          speed: 1.4
          incendiary: true
          yield: 1.0
          on_hit:
            - type: particle
              particle: EXPLOSION
              count: 3
              offset: 0.2
            - type: sound
              sound: ENTITY_GENERIC_EXPLODE
              volume: 1.0
              pitch: 0.7

magic_meteor_windup:
  helper: true
  target: self
  effects:
    - type: message
      text: "&6☄ &eНебо рыщется... метеор готовится."
    - type: effectlib
      at: self
      class: HelixEffect
      particle: lava
      radius: 1.0
      particles: 12
      iterations: 25
      period: 2

magic_meteor_impact:
  helper: true
  target: entity
  effects:
    - type: damage
      amount: 10
    - type: potion
      effect: WEAKNESS
      duration: 40
      amplifier: 0

magic_meteor_shockwave:
  helper: true
  target: entity
  effects:
    - type: velocity
      power: 1.6
      y: 0.45
    - type: particle
      particle: FLAME
      count: 50
      offset: 2.0

magic_meteor_cooldown_msg:
  helper: true
  target: self
  effects:
    - type: message
      text: "&6☄ &7Энергия метеора угасла."
